version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: skillforge-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: skillforge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillforge-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/skillforge?schema=public
      - JWT_SECRET=skillforge_jwt_access_secret_key_2026_super_secure
      - JWT_REFRESH_SECRET=skillforge_jwt_refresh_secret_key_2026_super_secure
      - RAZORPAY_KEY_ID=rzp_test_mockkeyid
      - RAZORPAY_KEY_SECRET=rzp_test_mockkeysecret
      - RAZORPAY_WEBHOOK_SECRET=rzp_webhook_secret
      - SMS_OTP_PROVIDER=mock
      - EMAIL_PROVIDER=mock
      - EMAIL_FROM=noreply@skillforge.com
      - FRONTEND_URL=http://localhost:3000
      - COMPANY_NAME=SkillForge Academy Private Limited
      - COMPANY_GSTIN=27AAAAA1111A1Z1
      - COMPANY_STATE=Maharashtra
      - COMPANY_ADDRESS=101, Tech Hub, Hiranandani Gardens, Powai, Mumbai - 400076
      - GST_RATE_PERCENT=18
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillforge-frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
